services:
  - type: web
    name: cy613h
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn cy613h.wsgi"
    envVars:
      - key: DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cy613h-db
          property: connectionString
    databases:
      - name: cy613h-db
        databaseName: django_db
        user: django_user
